<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" role="img" aria-label="Apollo AI News">
  <!-- Sun mark: rays + outlined disc + solid center dot. Brand accent (fixed burnt orange). -->
  <g transform="translate(4, 4)" stroke="#c2410c" stroke-linecap="round">
    <g fill="none" stroke-width="2">
      <line x1="28" y1="2"  x2="28" y2="9"/>
      <line x1="28" y1="47" x2="28" y2="54"/>
      <line x1="2"  y1="28" x2="9"  y2="28"/>
      <line x1="47" y1="28" x2="54" y2="28"/>
      <line x1="9.5"  y1="9.5"  x2="14"   y2="14"/>
      <line x1="42"   y1="42"   x2="46.5" y2="46.5"/>
      <line x1="46.5" y1="9.5"  x2="42"   y2="14"/>
      <line x1="9.5"  y1="46.5" x2="14"   y2="42"/>
    </g>
    <circle cx="28" cy="28" r="14" fill="none" stroke-width="2"/>
    <circle cx="28" cy="28" r="5"  fill="#c2410c" stroke="none"/>
  </g>
  <!-- Wordmark. Uses currentColor so it inherits the masthead's text color (light/dark friendly). -->
  <g transform="translate(76, 0)" fill="currentColor">
    <text x="0" y="34"
          font-family="Georgia,'Times New Roman',Charter,serif"
          font-size="28" font-weight="700" letter-spacing="0.6">APOLLO</text>
    <text x="0" y="54"
          font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
          font-size="11" font-weight="600" letter-spacing="3" fill="#c2410c">AI NEWS</text>
  </g>
</svg>
