<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #11151a; }
    .fg { fill: #f7f5ef; }
    .accent { fill: #c2410c; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #f7f5ef; }
      .fg { fill: #11151a; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="6"/>
  <text class="fg" x="16" y="22" font-family="Georgia,'Times New Roman',serif"
        font-size="16" font-weight="700" text-anchor="middle" letter-spacing="0.5">AI</text>
  <circle class="accent" cx="25" cy="7" r="2.5"/>
</svg>
